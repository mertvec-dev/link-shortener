<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Link Shortener{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 20px; }
        h2 { color: #555; margin: 20px 0 10px; }
        .nav { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .nav a { 
            color: #667eea; 
            text-decoration: none; 
            padding: 8px 16px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .nav a:hover { background: #f0f0f0; }
        .btn { 
            display: inline-block; 
            padding: 12px 24px; 
            background: #667eea; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover { background: #5568d3; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        .error { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .success { color: #28a745; background: #d4edda; padding: 10px; border-radius: 5px; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; color: #333; }
        tr:hover { background: #f8f9fa; }
        .footer { 
            text-align: center; 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 1px solid #eee;
            color: #888;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <nav class="nav" id="nav">
            <a href="/">🏠 Главная</a>
            <a href="/shorten">✂️ Сократить</a>
            <a href="/my-links">📊 Мои ссылки</a>
            <a href="/login" style="margin-left: auto;" class="auth-link">🔑 Вход</a>
            <a href="/register" class="auth-link">📝 Регистрация</a>
            <a href="/logout" style="margin-left: auto; display: none;" class="auth-link">🚪 Выйти</a>
        </nav>
        
        {% block content %}{% endblock %}
        
        <div class="footer">
            <p>🔗 Link Shortener | FastAPI + SQLModel + PostgreSQL + Docker</p>
        </div>
    </div>
    
    {% block extra_js %}{% endblock %}
    
    <script>
        // Показываем/скрываем кнопки в зависимости от наличия токена
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('access_token');
            const authLinks = document.querySelectorAll('.auth-link');
            
            if (token) {
                // Пользователь авторизован: показать "Выйти", скрыть "Вход" и "Регистрация"
                authLinks.forEach(link => {
                    if (link.getAttribute('href') === '/logout') {
                        link.style.display = 'block';
                    } else {
                        link.style.display = 'none';
                    }
                });
            } else {
                // Пользователь не авторизован: показать "Вход" и "Регистрация", скрыть "Выйти"
                authLinks.forEach(link => {
                    if (link.getAttribute('href') === '/logout') {
                        link.style.display = 'none';
                    } else {
                        link.style.display = 'block';
                    }
                });
            }
            
            // Автоматически добавляем токен из localStorage в заголовок Authorization
            if (token) {
                const originalFetch = window.fetch;
                window.fetch = function(url, options = {}) {
                    if (!options.headers) {
                        options.headers = {};
                    }
                    options.headers['Authorization'] = `Bearer ${token}`;
                    return originalFetch(url, options);
                };
            }
        });
    </script>
</body>
</html>
