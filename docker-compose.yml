
services:
  # База данных
  postgres:
    image: postgres:15
    container_name: link_shortener_db
    environment:
      POSTGRES_DB: linkdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 8132
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linkdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Приложение
  app:
    build: .
    container_name: link_shortener_app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: